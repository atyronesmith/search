apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-search-api
  namespace: production
  labels:
    app: file-search
    component: backend
    environment: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: file-search
      component: backend
  template:
    metadata:
      labels:
        app: file-search
        component: backend
    spec:
      containers:
      - name: api-server
        image: file-search:v1.2.3
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: connection-string
        - name: OLLAMA_URL
          value: "http://ollama-service:11434"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5