# File Search System Configuration
# This file contains all non-sensitive configuration parameters
# For sensitive parameters (passwords, API keys), see secrets.cfg

[database]
host = localhost
port = 5432
name = file_search
user = postgres
# password is in secrets.cfg
ssl_mode = disable
max_connections = 10
# database URL will be constructed from individual parameters + password from secrets.cfg

[server]
host = localhost
port = 8080
read_timeout = 30s
write_timeout = 30s

[indexing]
watch_paths = ~/Documents,~/Downloads
ignore_patterns = *.tmp,node_modules/**,.git/**,.DS_Store,*.log,*.photoslibrary/**,**/Spotlight/**,**/Caches/**,**/Cache/**
max_file_size = 100MB
chunk_size = 512
chunk_overlap = 50

[performance]
cpu_threshold = 90
memory_threshold = 90
files_per_minute = 60
embeddings_per_minute = 120
searches_per_minute = 300

[embeddings]
ollama_url = http://localhost:11434
ollama_model = nomic-embed-text
ollama_timeout = 30s
ollama_max_retries = 3

[search]
vector_weight = 0.6
bm25_weight = 0.3
metadata_weight = 0.1
cache_ttl = 1h
cache_size = 1000

[nlp]
service_url = http://localhost:8081
service_timeout = 10s
enabled = true

[docling]
service_url = http://localhost:5000
enabled = false

[unstructured]
api_url = http://localhost:8001
timeout = 300s
enabled = true

[logging]
level = info
format = json
file = logs/app.log

[development]
dev_mode = true
hot_reload = true
debug = false

[desktop]
window_width = 1200
window_height = 800
window_resizable = true
start_maximized = false
theme = light
api_url = http://localhost:8080
api_timeout = 30s

[monitoring]
scan_interval = 60s
debounce_delay = 500ms
max_workers = 4

[experimental]
royal_metadata = false
llm_search = true
auto_categorization = false